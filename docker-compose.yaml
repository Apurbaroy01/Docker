version: '3.8'

services:
  backend:
    build: ./dockerize_node_application
    container_name: node_c
    ports:
      - "5001:5001"
    volumes:
      - ./dockerize_node_application:/app
      - /app/node_modules
    networks:
      - default

  frontend:
    build: ./dockerize_react_application
    container_name: react_c
    ports:
      - "5173:5173"
    volumes:
      - ./dockerize_react_application:/app
      - /app/node_modules
    networks:
      - default
  
  # DB:
  #   image: mongo
  #   container_name: mongo_c
  #   ports:
  #     - "27017:27017"
  #   networks:
  #     - default


networks:
  default:
    driver: bridge
